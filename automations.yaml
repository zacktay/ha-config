- id: '1731830315735'
  alias: Living Room / Idle
  description: Turns off the TV or AC after a long period of inactivity in the living
    room.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.living_room_presence_sensor_presence_sensor_1
    to: 'off'
    for:
      hours: 2
      minutes: 0
      seconds: 0
    id: Presence
  - trigger: state
    entity_id:
    - climate.daikinap53642
    to:
    - cool
    - dry
    - fan_only
    - heat
    - heat_cool
    for:
      hours: 3
      minutes: 0
      seconds: 0
  conditions: []
  actions:
  - choose:
    - conditions:
      - alias: No presence detected for 2 hours
        condition: trigger
        id: Presence
      sequence:
      - if:
        - condition: state
          state: 'on'
          entity_id: media_player.bravia_4k_vh22
        then:
        - service: script.living_room_tv_off
    - conditions:
      - alias: AC has been on for 3 hours
        condition: trigger
        id: AC
      sequence:
      - if:
        - condition: state
          entity_id: binary_sensor.living_room_presence_sensor_presence_sensor_1
          state: 'off'
          for:
            hours: 2
            minutes: 0
            seconds: 0
        then:
        - service: script.living_room_ac_off
  mode: single
- id: '1732026072011'
