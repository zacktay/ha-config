        id:
        - Wardrobe Not Detected
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.master_downlights_r3
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Vanity Detected
        - condition: state
          entity_id: input_boolean.baby_in_master
          state:
          - 'off'
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.is_bed_time
          state: 'on'
        then:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: light.vanity_light_strip
        else:
        - action: light.turn_on
          metadata: {}
          data:
