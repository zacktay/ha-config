- id: '1762346345987'
  alias: Master / AC Humidity
  description: Turns on dry mode when humidity is high, and back to cool mode when
    it's normal or after 1.5 hours.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.master_temperature_sensor_humidity_sensor_3
    for:
      hours: 0
      minutes: 10
      seconds: 0
    above: 80
    id: High Humidity (Detected)
  - device_id: 8960a0764affd323f6532e62a21b57c6
    domain: climate
    entity_id: 6b161eba30356e1b4e1de24aa3b28b0b
    type: hvac_mode_changed
    trigger: device
    to: dry
    for:
      hours: 1
      minutes: 30
      seconds: 0
    id: Dry Mode (1.5H)
  - trigger: numeric_state
    entity_id:
    - sensor.master_temperature_sensor_humidity_sensor_3
    id: Target Humidity Achieved
    for:
      hours: 0
      minutes: 10
      seconds: 0
    below: 60
  conditions: []
  actions:
  - choose:
    - conditions:
      - alias: Humidity is high
        condition: trigger
        id: High Humidity (Detected)
      sequence:
      - service: script.master_ac_dry_mode
    - conditions:
      - alias: Dry mode has been on for 1.5 hours
        condition: trigger
        id: Dry Mode (1.5H)
      sequence:
      - service: script.master_ac_cool_mode
    - conditions:
      - alias: Target humidity has been achieved
        condition: trigger
        id: Target Humidity Achieved
      sequence:
      - if:
        - alias: AC is currently in drying mode
          condition: state
          entity_id: climate.master_daikin_ac
          attribute: hvac_action
          state: drying
        then:
        - service: script.master_ac_cool_mode
  mode: single
