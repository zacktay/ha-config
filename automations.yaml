  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.study_presence_sensor_presence_sensor_1
    to: 'on'
    id: Detected
  - trigger: state
    entity_id:
    - binary_sensor.study_presence_sensor_presence_sensor_1
    to: 'off'
