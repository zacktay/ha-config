      - if:
        - condition: state
          entity_id: cover.living_day_curtain
          state: closed
        then:
        - data:
            scene_id: living_room_day_curtain_state
            snapshot_entities:
            - cover.living_day_curtain
          action: scene.create
        - target:
            entity_id: cover.living_day_curtain
          action: cover.open_cover
    - conditions:
      - condition: trigger
