    for:
      hours: 0
      minutes: 1
      seconds: 0
  - trigger: illuminance.crossed_threshold
    target:
      entity_id: sensor.study_presence_sensor_light_sensor_light_level
    options:
      threshold:
        type: above
        value:
          active_choice: number
          number: 30
    id: Too Bright
    enabled: false
  - trigger: illuminance.crossed_threshold
    target:
      entity_id: sensor.study_presence_sensor_light_sensor_light_level
    options:
      threshold:
        type: below
        value:
          active_choice: number
          number: 10
    id: Too Dim
    enabled: false
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Detected
      sequence:
      - alias: Lights
