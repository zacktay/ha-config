            entity_id:
            - light.master_l1
            - light.lightbulb_4
    - conditions:
      - condition: trigger
        id:
        - Bathroom Walkway Detected
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.baby_in_master
          state:
          - 'on'
        then:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.master_t2_3
            - light.master_t2_4
        else:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: light.master_downlights_r2
    - conditions:
      - condition: trigger
        id:
        - Bathroom Walkway Not Detected
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.master_downlights_r2
      - if:
        - condition: state
          entity_id: binary_sensor.presence_sensor_fp2_924b_presence_sensor_5
          state:
          - 'off'
        then:
        - action: light.turn_off
          metadata: {}
          target:
            entity_id: light.master_downlights_r3
          data: {}
    - conditions:
      - condition: trigger
        id:
        - Wardrobe Detected
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.baby_in_master
          state:
          - 'on'
        then:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.master_t2_3
            - light.master_t2_4
        else:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: light.master_downlights_r3
    - conditions:
