    - binary_sensor.master_presence_sensor_presence_sensor_1
    to: 'off'
    id: Generic Not Detected
    for:
      hours: 0
      minutes: 1
      seconds: 0
  - trigger: state
    entity_id:
    - binary_sensor.presence_sensor_fp2_924b_presence_sensor_3
    to: 'on'
    id: Vanity Detected
    enabled: true
  - trigger: state
    entity_id:
    - binary_sensor.presence_sensor_fp2_924b_presence_sensor_3
    to: 'off'
    id: Vanity Not Detected
    for:
      hours: 0
      minutes: 1
      seconds: 0
    enabled: true
  - trigger: state
    entity_id:
    - binary_sensor.presence_sensor_fp2_924b_presence_sensor_7
    id: Bathroom Walkway Detected
    to: 'on'
    enabled: true
  - trigger: state
