      seconds: 0
  - trigger: state
    entity_id:
    - binary_sensor.service_yard_motion_sensor
    to:
    - 'on'
    id: Detected
  conditions: []
  actions:
  - choose:
    - conditions:
      - alias: No Motion for 1 Minute
        condition: trigger
        id: Not Detected
      sequence:
      - if:
        - alias: No motion in kitchen and lights are on
          condition: and
          conditions:
          - condition: state
            entity_id: binary_sensor.kitchen_motion_sensor
            state: 'off'
          - condition: state
            entity_id: light.service_yard_l1
            state: 'on'
        then:
        - service: script.service_yard_pet_lights_off
    - conditions:
      - alias: Motion Detected
        condition: trigger
        id: Detected
      sequence:
      - choose:
        - conditions:
          - alias: It is midnight or bed time
            condition: or
            conditions:
            - condition: state
              entity_id: binary_sensor.is_midnight
              state: 'on'
            - condition: state
              entity_id: input_boolean.is_bed_time
              state: 'on'
          sequence:
          - if:
            - condition: state
              entity_id: light.service_yard_l1
              state: 'off'
            then:
            - service: script.service_yard_light_on
        - conditions:
          - alias: It is not daytime
            condition: state
            entity_id: binary_sensor.is_daytime
            state: 'off'
          sequence:
          - service: script.service_yard_hub_light_on
