- id: system_vacuum_auto_update_last_cleaned
  alias: System / Vacuum Auto Update Last Cleaned
  description: Automatically updates last cleaned time when the vacuum is cleaning
    a room
  triggers:
  - trigger: state
    entity_id:
    - sensor.dreame_x40_ultra_current_room
    for:
      hours: 0
      minutes: 5
      seconds: 0
  - trigger: state
    entity_id:
    - vacuum.dreame_x40_ultra
    attribute: status
    to:
    - Cleaning
    - Room cleaning
    - Segment cleaning
    - Zone cleaning
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: template
    value_template: '{{ state_attr(''vacuum.dreame_x40_ultra'', ''status'') in [''Cleaning'',
      ''Room cleaning'', ''Segment cleaning'', ''Zone cleaning''] }}'
  - condition: template
    value_template: '{{ state_attr(''vacuum.dreame_x40_ultra'', ''current_segment'')
      is not none }}'
  actions:
  - action: script.system_update_last_cleaned_time
    data:
      segments:
      - '{{ state_attr(''vacuum.dreame_x40_ultra'', ''current_segment'') }}'
  mode: single
- id: system_notify_to_clean_room
  alias: System / Notify to Clean Room
  description: Notifies if a room hasn't been cleaned for a week and the door is open.
  trigger:
  - platform: time
    at: '10:00:00'
  action:
  - variables:
      rooms:
      - name: Bedroom
        last_cleaned: input_datetime.last_cleaned_bedroom
        door_sensor: binary_sensor.master_door_sensor_3
        clean_script: script.system_dreame_clean_bedroom
        tag: clean_bedroom
      - name: Guest Room
        last_cleaned: input_datetime.last_cleaned_guest
        door_sensor: binary_sensor.guest_door_sensor_2
        clean_script: script.system_dreame_clean_guest
        tag: clean_guest
      - name: Study
        last_cleaned: input_datetime.last_cleaned_study
        door_sensor: binary_sensor.contact_sensor
        clean_script: script.system_dreame_clean_study
        tag: clean_study
      - name: Living Room
        last_cleaned: input_datetime.last_cleaned_living_room
        clean_script: script.system_clean_living_room
        tag: clean_living_room
      - name: Foyer
        last_cleaned: input_datetime.last_cleaned_foyer
        clean_script: script.system_dreame_clean_foyer
        tag: clean_foyer
      - name: Kitchen
        last_cleaned: input_datetime.last_cleaned_kitchen
        clean_script: script.system_dreame_clean_kitchen
        tag: clean_kitchen
  - repeat:
      for_each: '{{ rooms }}'
      sequence:
      - condition: template
        value_template: '{{ (now() - (states(repeat.item.last_cleaned) | as_datetime
          | as_local)).days >= 7 }}'
      - condition: template
        value_template: '{{ repeat.item.door_sensor is not defined or is_state(repeat.item.door_sensor,
          ''on'') }}'
      - service: notify.mobile_app_pixel_10_pro_xl
        data:
          title: Clean {{ repeat.item.name }}?
          message: '{{ repeat.item.name }} has not been cleaned for a week{{ " and
            the door is open" if repeat.item.door_sensor is defined else "" }}.'
          data:
            tag: '{{ repeat.item.tag }}'
            actions:
            - action: CLEAN_ROOM
              title: Confirm
              data:
                script: '{{ repeat.item.clean_script }}'
            - action: DISMISS
              title: Dismiss
- id: system_handle_clean_room_notification_action
  alias: System / Handle Clean Room Notification Action
  description: Handles the 'Confirm' action from the clean room notification.
  trigger:
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: CLEAN_ROOM
  action:
  - service: '{{ trigger.event.data.script }}'
    data: {}
  mode: single
