    entity_id:
    - binary_sensor.presence_sensor_occupancy_sensor
    to:
    - 'off'
    id: Not Detected
  conditions: []
  actions:
  - choose:
    - conditions:
      - alias: Presence Detected
        condition: trigger
        id: Detected
      sequence:
      - service: script.common_bathroom_lights_on
    - conditions:
      - alias: Presence Not Detected
        condition: trigger
        id: Not Detected
      sequence:
      - if:
        - alias: Toilet cleaning mode is off
          condition: state
          entity_id: input_boolean.is_toilet_cleaning
          state: 'off'
