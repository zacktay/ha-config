
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
# automation ui: !include automations.yaml
# automation manual: !include_dir_merge_list automations/
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include template.yaml

http:
  ip_ban_enabled: true
  login_attempts_threshold: 5
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.1.3
    - 192.168.0.0/16
    - 172.30.33.0/24

input_datetime:
  last_cleaned_bedroom:
    name: Last Cleaned Bedroom
    has_date: true
    has_time: true
  last_cleaned_guest:
    name: Last Cleaned Guest Room
    has_date: true
    has_time: true
  last_cleaned_study:
    name: Last Cleaned Study
    has_date: true
    has_time: true
  last_cleaned_hallway:
    name: Last Cleaned Hallway
    has_date: true
    has_time: true
  last_cleaned_living_room:
    name: Last Cleaned Living Room
    has_date: true
    has_time: true
  last_cleaned_foyer:
    name: Last Cleaned Foyer
    has_date: true
    has_time: true
  last_cleaned_kitchen:
    name: Last Cleaned Kitchen
    has_date: true
    has_time: true
  last_cleaned_service_yard:
    name: Last Cleaned Service Yard
    has_date: true
    has_time: true
