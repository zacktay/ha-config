system_update_last_cleaned_time:
  alias: System / Update Last Cleaned Time
  description: Updates the last cleaned time for given segments
  sequence:
  - condition: template
    value_template: '{{ segments is defined and segments | length > 0 }}'
  - action: input_datetime.set_datetime
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    target:
      entity_id: "{% set entity_map = {\n  1: 'input_datetime.last_cleaned_bedroom',\n
        \ 2: 'input_datetime.last_cleaned_guest',\n  3: 'input_datetime.last_cleaned_service_yard',\n
        \ 4: 'input_datetime.last_cleaned_study',\n  5: 'input_datetime.last_cleaned_hallway',\n
        \ 6: 'input_datetime.last_cleaned_kitchen',\n  7: 'input_datetime.last_cleaned_foyer',\n
        \ 8: 'input_datetime.last_cleaned_living_room'\n} %} {% set ns = namespace(entities=[])
        %} {% for seg in segments %}\n  {% if (seg | int) in entity_map %}\n    {%
        set ns.entities = ns.entities + [entity_map[(seg | int)]] %}\n  {% endif %}\n{%
        endfor %} {{ ns.entities | join(',') if ns.entities | length > 0 else 'none'
        }}\n"
system_dreame_queue_room_clean:
  alias: System / Dreame Queue Room Clean
  description: Queues a room cleaning task for the Dreame vacuum.
  mode: queued
  fields:
    segment:
      description: The segment ID to clean.
      example: 1
  sequence:
  - wait_template: '{{ states(''vacuum.dreame_x40_ultra'') in [''docked'', ''idle'']
      }}'
    timeout:
      hours: 2
    continue_on_timeout: false
  - target:
      entity_id: vacuum.dreame_x40_ultra
    data:
      segments:
      - '{{ segment }}'
    action: dreame_vacuum.vacuum_clean_segment
  - data:
      segments:
      - '{{ segment }}'
    action: script.system_update_last_cleaned_time
  - wait_template: '{{ states(''vacuum.dreame_x40_ultra'') not in [''docked'', ''idle'']
      }}'
    timeout:
      seconds: 30
    continue_on_timeout: true
  - wait_template: '{{ states(''vacuum.dreame_x40_ultra'') in [''docked'', ''idle'']
      }}'
    timeout:
      hours: 2
    continue_on_timeout: true
system_toggle_adaptive_lighting_sleep_mode:
  alias: System / Toggle Adaptive Lighting Sleep Mode
  description: Toggles adaptive lighting sleep mode for a specific room or list of
    rooms.
  fields:
    entities:
      description: The room suffix(s) to toggle adaptive lighting sleep mode for.
      example: switch.adaptive_lighting_sleep_mode_adaptive_guest_lights would be
        guest_lights
  sequence:
  - action: switch.toggle
    metadata: {}
    target:
      entity_id: "{% set entities = [entities] if entities is string else entities
        %} {% set ns = namespace(entities=[]) %} {% for e in entities %}\n  {% set
        ns.entities = ns.entities + ['switch.adaptive_lighting_sleep_mode_adaptive_'
        ~ e] %}\n{% endfor %} {{ ns.entities }}\n"
    data: {}
