foyer_doorbell_ring_actions:
  alias: Foyer Doorbell Ring Actions
  sequence:
  - variables:
      triggerTimestamp: '{{ now().strftime(''%Y%m%d_%H%M%S'') }}'
  - action: camera.snapshot
    metadata: {}
    data:
      filename: /media/snapshots/doorbell_{{ triggerTimestamp }}.jpg
    target:
      device_id: 6a305642c8d835c86d719139d80856ee
  - if:
    - condition: state
      entity_id: device_tracker.pixel_9_pro_xl
      state:
      - not_home
      - GW's Workplace
      - In Law's
      - Parent's
      - 'Sachi''s Workplace '
    then:
    - action: notify.mobile_app_pixel_9_pro_xl
      metadata: {}
      data:
        data:
          image: /media/local/snapshots/doorbell_{{ triggerTimestamp }}.jpg
        title: Doorbell
        message: Someone rang the doorbell
    alias: Send Notification
  - if:
    - condition: device
      device_id: 35a8e6c2c7d87a3a4f877ff6c429ab86
      domain: media_player
      entity_id: 5261dc35b6ca28bf5b43c27b87ad8e3b
      type: is_playing
    then:
    - action: media_player.media_play_pause
      metadata: {}
      data: {}
      target:
        device_id: 35a8e6c2c7d87a3a4f877ff6c429ab86
    - wait_for_trigger:
      - trigger: state
        entity_id:
        - binary_sensor.main_door_sensor
        to:
        - 'off'
        for:
          hours: 0
          minutes: 0
          seconds: 2
        from:
        - 'on'
    - delay:
        hours: 0
        minutes: 0
        seconds: 5
        milliseconds: 0
    - action: media_player.media_play
      metadata: {}
      data: {}
      target:
        device_id: 35a8e6c2c7d87a3a4f877ff6c429ab86
    alias: Play / Pause TV
